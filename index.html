<html lang="ru">
<head>

    <style>
        /* ========== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ========== */
        :root {
            --primary: #4A90E2;
            --primary-glow: #4A90E2;
            --bg: #0a0a1a;
            --card-bg: rgba(22, 30, 62, 0.9);
            --text: #e94560;
            --text-glow: #ff6b8a;
            --subtext: #ffffff;
            --border-glow: #4A90E2;
            --shadow: 0 5px 25px rgba(0,0,0,0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* ========== РЕЖИМ ПРОЕКТОРА (СУПЕР КОНТРАСТ) ========== */
        body.projector-mode {
            --bg: #000000 !important;
            --card-bg: #000000 !important;
            --subtext: #FFFFFF !important;
            --text: #FFEA00 !important;
            --primary: #FFEA00 !important;
            --border-glow: #FFFFFF !important;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            min-height: 100vh;
        }
        
        body { 
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--subtext); 
            padding: 20px 20px 60px 20px;
            line-height: 1.6; 
            min-height: 100vh;
            transition: var(--transition);
            position: relative;
        }
        
        /* Шумовая текстура для атмосферы */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.3;
            z-index: 0;
        }
        
        body > * {
            position: relative;
            z-index: 1;
        }
        
        /* ========== ХЕДЕР С КНОПКОЙ ========== */
        header { 
            text-align: center; 
            padding: 20px 0 30px;
            position: relative;
        }
        
        h1 { 
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: clamp(1.8rem, 7vw, 3rem); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(233,69,96,0.3);
        }
        
        /* Проектор-режим для заголовка */
        body.projector-mode h1 {
            background: linear-gradient(135deg, #FFEA00 0%, #FFEA00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255,234,0,0.5);
        }
        
        /* Кнопка переключения режима — СТИЛЬНАЯ */
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--text);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        .mode-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--text);
        }
        
        body.projector-mode .mode-toggle {
            background: #000000;
            border-color: #FFEA00;
            color: #FFEA00;
            box-shadow: 0 0 20px #FFEA00;
            font-weight: 900;
        }
        
        .counter { 
            color: var(--primary); 
            margin: 15px 0; 
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        /* Строка поиска — МАКСИМАЛЬНО ВИДИМАЯ */
        .search-box { 
            display: block; 
            width: 90%; 
            max-width: 650px; 
            margin: 0 auto 30px; 
            padding: 14px 24px; 
            border: 3px solid var(--text); 
            border-radius: 60px; 
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            color: white; 
            font-size: 1rem; 
            outline: none; 
            transition: var(--transition);
            font-weight: 500;
        }
        
        .search-box:focus { 
            border-color: var(--primary);
            box-shadow: 0 0 25px var(--text);
            background: rgba(0,0,0,0.8);
        }
        
        .search-box::placeholder {
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }
        
        body.projector-mode .search-box {
            border-width: 4px;
            font-size: 1.2rem;
            padding: 16px 28px;
        }
        
        /* ========== СЕТКА СЛОВАРЯ ========== */
        .dictionary { 
            max-width: 1000px; 
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }
        
        /* КАРТОЧКИ — МОЩНЫЕ И ЧИТАЕМЫЕ */
        .word-card { 
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            padding: 18px 22px; 
            border-radius: 20px; 
            cursor: pointer; 
            border-left: 6px solid var(--text); 
            border-right: 1px solid rgba(255,255,255,0.1);
            transition: var(--transition); 
            position: relative;
            box-shadow: var(--shadow);
        }
        
        .word-card:hover { 
            transform: translateX(8px) translateY(-3px); 
            background: rgba(31, 45, 82, 0.95);
            border-left-width: 8px;
        }
        
        body.projector-mode .word-card {
            border-left: 8px solid #FFEA00 !important;
            border-right: 2px solid #FFFFFF !important;
            background: #000000 !important;
            padding: 24px 28px !important;
        }
        
        body.projector-mode .word-card:hover {
            transform: translateX(10px) translateY(-5px);
            box-shadow: 0 0 0 2px #FFFFFF, 0 10px 40px rgba(255,255,255,0.2);
        }
        
        .word-title { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: var(--text); 
            letter-spacing: -0.5px;
            transition: var(--transition);
        }
        
        body.projector-mode .word-title {
            font-size: 1.8rem !important;
            font-weight: 900 !important;
            color: #FFEA00 !important;
            text-shadow: 2px 2px 0 #000000;
        }
        
        .details { 
            display: none; 
            margin-top: 16px; 
            border-top: 2px solid rgba(255,255,255,0.15); 
            padding-top: 16px; 
            animation: fadeIn 0.3s ease; 
            color: #ddd; 
            font-size: 0.95rem;
        }
        
        body.projector-mode .details {
            border-top: 3px solid #FFFFFF;
            font-size: 1.15rem;
            line-height: 1.7;
        }
        
        body.projector-mode .details b {
            color: #FFEA00;
            font-weight: 900;
        }
        
        .word-card.active .details { 
            display: block; 
        }
        
        .example {
            margin-top: 10px;
            color: var(--primary);
            font-style: italic;
            padding-left: 10px;
            border-left: 3px solid var(--primary);
        }
        
        body.projector-mode .example {
            color: #FFFFFF !important;
            border-left-color: #FFEA00 !important;
            font-size: 1rem;
            font-style: normal;
            font-weight: 500;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .no-results { 
            text-align: center; 
            color: var(--text); 
            margin-top: 50px; 
            font-size: 1.2rem;
            font-weight: bold;
            padding: 40px;
            border: 2px dashed var(--text);
            border-radius: 30px;
        }
        
        /* Скролл */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--text);
            border-radius: 10px;
        }
    </style>
</head>
