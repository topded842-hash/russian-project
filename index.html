    <title data-id="th-modified">Мой Большой Интернет-Словарь</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e94560;
            --subtext: #ffffff;
        }
        
        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--subtext); 
            margin: 0; 
            padding: 20px 20px 50px 20px;
            line-height: 1.6; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        header { 
            text-align: center; 
            padding: 30px 0; 
        }
        
        h1 { 
            color: var(--text); 
            font-size: 2.5em; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 5px; 
        }
        
        .counter { 
            color: #888; 
            margin-bottom: 20px; 
            font-size: 0.9em; 
        }
        
        .search-box { 
            display: block; 
            width: 90%; 
            max-width: 600px; 
            margin: 0 auto 40px; 
            padding: 15px 25px; 
            border: 2px solid var(--text); 
            border-radius: 30px; 
            background: transparent; 
            color: white; 
            font-size: 18px; 
            outline: none; 
            transition: 0.3s; 
        }
        
        .search-box:focus { 
            box-shadow: 0 0 15px var(--text); 
        }
        
        .dictionary { 
            max-width: 900px; 
            margin: 0 auto; 
            display: grid; 
            gap: 15px; 
        }
        
        .word-card { 
            background: var(--card-bg); 
            padding: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            border-left: 5px solid var(--text); 
            transition: 0.2s; 
            position: relative; 
        }
        
        .word-card:hover { 
            transform: translateY(-2px); 
            background: #1f2d52; 
        }
        
        .word-title { 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--text); 
        }
        
        .details { 
            display: none; 
            margin-top: 12px; 
            border-top: 1px solid #30475e; 
            padding-top: 12px; 
            animation: fadeIn 0.3s; 
            color: #ddd; 
        }
        
        .word-card.active .details { 
            display: block; 
        }

        .example {
            margin-top: 8px;
            color: #4A90E2;
            font-style: italic;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        
        .no-results { 
            text-align: center; 
            color: #888; 
            margin-top: 50px; 
        }
    </style>

    ];

    const container = document.getElementById('dictionary');
    const searchInput = document.getElementById('search');
    const countInfo = document.getElementById('count-info');

    function displayWords(filter = '') {
        container.innerHTML = '';
        const filtered = words.filter(w => w.term.toLowerCase().includes(filter.toLowerCase()));
        
        filtered.sort((a, b) => a.term.localeCompare(b.term));

        countInfo.innerText = `Всего слов: ${filtered.length}`;

        if(filtered.length === 0) {
            container.innerHTML = '<div class="no-results">У нас! Такого слова пока нет в нашем словаре :(</div>';
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `
                <div class="word-title">${item.term}</div>
                <div class="details">
                    <div><b>Значение:</b> ${item.meaning}</div>
                    <div class="example"><b>Пример:</b> ${item.example}</div>
                </div>
            `;
            card.addEventListener('click', () => card.classList.toggle('active'));
            container.appendChild(card);
        });
    }

    searchInput.addEventListener('input', (e) => displayWords(e.target.value));
    displayWords();
</script>
