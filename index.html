<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Словарь: Язык интернета</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg: #0a0a1a;
            --card-bg: #16213e;
            --text: #e94560;
            --subtext: #ffffff;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--subtext);
            padding: 20px 20px 60px 20px;
            line-height: 1.6;
            transition: all 0.3s;
        }
        
        body.projector-mode {
            --bg: #000000 !important;
            --card-bg: #000000 !important;
            --subtext: #FFFFFF !important;
            --text: #FFEA00 !important;
        }
        
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--card-bg);
            border: 2px solid var(--text);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .mode-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--text);
        }
        
        body.projector-mode .mode-toggle {
            background: #000;
            border-color: #FFEA00;
            color: #FFEA00;
            box-shadow: 0 0 20px #FFEA00;
        }
        
        header {
            text-align: center;
            padding: 20px 0 30px;
        }
        
        h1 {
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: clamp(1.8rem, 7vw, 3rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }
        
        .counter {
            color: var(--primary);
            margin: 15px 0;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .search-box {
            display: block;
            width: 90%;
            max-width: 650px;
            margin: 0 auto 30px;
            padding: 14px 24px;
            border: 3px solid var(--text);
            border-radius: 60px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--text);
        }
        
        body.projector-mode .search-box {
            border-width: 4px;
            font-size: 1.2rem;
            padding: 16px 28px;
        }
        
        .dictionary {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .word-card {
            background: var(--card-bg);
            padding: 18px 22px;
            border-radius: 20px;
            cursor: pointer;
            border-left: 6px solid var(--text);
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .word-card:hover {
            transform: translateX(8px) translateY(-3px);
            background: #1f2d52;
        }
        
        body.projector-mode .word-card {
            border-left: 8px solid #FFEA00 !important;
            background: #000000 !important;
        }
        
        body.projector-mode .word-card:hover {
            transform: translateX(10px) translateY(-5px);
            box-shadow: 0 0 0 2px #fff;
        }
        
        .word-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
        }
        
        body.projector-mode .word-title {
            font-size: 1.8rem !important;
            color: #FFEA00 !important;
        }
        
        .details {
            display: none;
            margin-top: 16px;
            border-top: 2px solid rgba(255,255,255,0.15);
            padding-top: 16px;
            animation: fadeIn 0.3s ease;
            color: #ddd;
        }
        
        body.projector-mode .details {
            border-top: 3px solid #fff;
            font-size: 1.15rem;
        }
        
        body.projector-mode .details b {
            color: #FFEA00;
        }
        
        .word-card.active .details {
            display: block;
        }
        
        .example {
            margin-top: 10px;
            color: var(--primary);
            font-style: italic;
            padding-left: 10px;
            border-left: 3px solid var(--primary);
        }
        
        body.projector-mode .example {
            color: #fff !important;
            border-left-color: #FFEA00 !important;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .no-results {
            text-align: center;
            color: var(--text);
            margin-top: 50px;
            font-size: 1.3rem;
            padding: 40px;
            border: 2px dashed var(--text);
            border-radius: 30px;
        }
    </style>
</head>

                <div class="details">
                    <div><b>📖 Значение:</b> ${item.meaning}</div>
                    <div class="example"><b>💬 Пример:</b> ${item.example}</div>
                </div>
            `;
            card.addEventListener('click', () => card.classList.toggle('active'));
            container.appendChild(card);
        });
    }

    searchInput.addEventListener('input', (e) => displayWords(e.target.value));
    
    let isProjectorMode = false;
    modeToggle.addEventListener('click', () => {
        isProjectorMode = !isProjectorMode;
        if (isProjectorMode) {
            document.body.classList.add('projector-mode');
            modeToggle.innerHTML = '🖥️ ОБЫЧНЫЙ РЕЖИМ';
        } else {
            document.body.classList.remove('projector-mode');
            modeToggle.innerHTML = '🔆 ПРОЕКТОР РЕЖИМ';
        }
    });
    
    displayWords();
</script>

</body>
</html>
